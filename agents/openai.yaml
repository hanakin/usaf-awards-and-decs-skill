EPB 2023:
E:
- Peter analyzed 312 intel reports to track 100 malicious cyber actors, producing 4 critical intelligence products that informed senior J2 and TF leaders and enabled 3 operations. He also executed 300 project taskings requiring research, analysis, and reporting, accelerated turnaround, directly supporting disruption of a primary CCMD cyber threat.
L:
- Peter audited analysts during premier cyber exercise, providing critical feedback to exercise leads shaping future execution and refined elite cyber teams’ offensive and defensive tactics. During Red Flag exercise, he produced 200 real-time intel products for a cyber mission element, enhancing intel integration to accelerate operational outcomes.
M:
- SrA Peter Snuffy maximized effectiveness by training in subjects outside his specialty, completing the 216-hour Cyber Threat Intelligence Analysis course with a 4.0 GPA, certifying as a Basic-level All Source Analyst within the Cyber community, which ensured all 58 reports were selected and communicated effectively to Joint Task Force leadership.
I:
- SrA Peter Snuffy is always the first to volunteer for events both in the squadron and community. He was instrumental in raising $5000 for events through the post Top 3. This helped fund the Air Force Ball for all Fort Meade, promoting tradition and esprit de corps. He is also sponsoring two new Airmen, being a conduit to the area and unit.
H:
- SrA Peter Snuffy supported STORMFORCE: an international, inter-service Electronic Warfare exercise spanning 2 months with 600 people, directly impacting 89 sorties and validating 9 procedures, earning a Letter of Appreciation from the exercise chief.

EPB 2024:
E:
- Peter completed a 16 hr foreign threats & generative AI course, refining disinformation detection and countermeasures on 22 products for 8 targets. He conducted IPB for 13 personnel in the offensive cyber element of Red Flag 25-1, analyzing 60 multi-source reports to develop a common operating picture for the mission commander.
L:
- Peter instructed 17 hrs of Tactical Combat Casualty Care courses for 85 Amn helping the Sq meet 100% CSAF readiness requirement. He completed 3 days of resilience training, earning his Resilience Training Assistant certification, increasing Sq resilience training availability by 11% and expanding support for 134 Amn
M:
- Peter orchestrated 5 Sq events, securing $1,292 for venues and meals, strengthening camaraderie for 151 Airmen and families. He completed 27 training items for senior-level certification, driving a junior airman to senior-level proficiency for a 50% boost in his job roles readiness directly aligning with a NAF #1 Priority.
I:
- Peter audited the clearance access database, resolving issues for 10 TF members ensuring unhindered intel activities during 4 ops. He volunteered 16 hrs for Wreaths Across America, an AI conference, and the NCO Induction, honoring 47 fallen heroes, supporting 550 military members, and promoting Air Force program awareness to foster esprit de corps.
H:
- Peter generated 51 weekly assessments & 129 daily products synthesizing intel from 22 sources and 5.5K reports. He dedicated 135 hrs to 3 RFIs, reviving an 8-month dormant foreign adversary, driving 5 cyber ops executed by a forward deployed unit.

EPB 2025:
E:
- SrA Peter Snuffy published a report disclosing adversary recruitment techniques, which fortified the security posture with respect to the top priority national mission and was praised by the 16th Air Force Commander. Overall, he has created 58 reports after evaluating 950 documents, providing timely products for Joint Task Force leadership.
L:
- Peter audited analysts during premier cyber exercise, providing critical feedback to exercise leads shaping future execution and refined elite cyber teams’ offensive and defensive tactics. During Red Flag exercise, he produced 200 real-time intel products for a cyber mission element, enhancing intel integration to accelerate operational outcomes.
M:
- Peter trained 5 analysts on 217 basic and 194 senior JQR items, rapid qualification closing a manning gap, raising qualified personnel by 12% and enabling sustained TF surge ops. He taught TCCC to 35 Airmen and led 2 resiliency sessions for 250 personnel, delivering lifesaving skills and enhancing readiness in support of the SECWAR’s #1 priority.
I:
- SSgt Peter Snuffy led 3 beach cleanups and supported AFSA outreach via a catering company, earning city recognition and enhancing civic engagement. He secured $2K in UNITE Fund for food, venue, and morale-focused programming for 2 sq events benefiting 150 Airmen, increasing connectedness, resilience, and unit cohesion per CC direction.
H:
- Peter led a rewrite of the analysis training, closing training gaps across core analytic tasks and enabling qualified analysts to support steady-state ops, driving the Group’s highest readiness. He balanced mission and admin duties at the SSgt level.






